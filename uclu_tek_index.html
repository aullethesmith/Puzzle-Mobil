<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DERİN SULAR ÜÇLEMESİ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
body{margin:0;padding:20px;background:#000814;display:flex;justify-content:center;min-height:100vh;font-family:sans-serif;}
#mc-wrapper{width:100%;max-width:700px;height:680px;margin:0 auto;position:relative;}
#mc-root{width:100%;height:100%;position:relative;overflow:hidden;border-radius:12px;background:linear-gradient(180deg,#001830 0%,#002248 45%,#001428 72%,#000508 100%);}
#mc-frame{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none;background:#000814;}
#mc-menu{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;z-index:10;padding:0 16px;}
#mc-menu.hidden{display:none;}
#mc-title{font-size:clamp(20px,6vw,30px);font-weight:900;letter-spacing:0.1em;text-transform:uppercase;background:linear-gradient(135deg,#a0a8b0 0%,#d0d8e0 40%,#788090 70%,#b0bac4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.7));text-align:center;}
#mc-btnstack{display:flex;flex-direction:column;gap:14px;align-items:center;}
.mc-btn{display:inline-block;font-family:sans-serif;font-weight:700;color:#ffffff;letter-spacing:0.04em;line-height:1.2;white-space:nowrap;cursor:pointer;border:none;outline:none;text-shadow:0 1px 3px rgba(0,0,0,0.4);}
.mc-btn:active{transform:translateY(2px);}
.mc-btn.green-stop{font-size:20px;padding:11px 36px;border-radius:12px;background:linear-gradient(160deg,#4dc870 0%,#2a9a50 45%,#1a6a35 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,0.25),inset 0 -3px 0 rgba(0,0,0,0.35),0 5px 14px rgba(20,140,60,0.5);}
.mc-btn.green-stop.upper{text-transform:uppercase;}
.mc-btn.red-stop-sm{font-size:12px;padding:6px 16px;border-radius:8px;background:linear-gradient(160deg,#e03020 0%,#b01a10 45%,#7a0808 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,0.2),inset 0 -2px 0 rgba(0,0,0,0.4),0 3px 8px rgba(160,30,20,0.55);}
.mc-btn.small-return-green{font-size:15px;padding:8px 24px;border-radius:10px;background:linear-gradient(160deg,#4dc870 0%,#2a9a50 45%,#1a6a35 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,0.25),inset 0 -3px 0 rgba(0,0,0,0.35),0 4px 10px rgba(20,140,60,0.5);}
#mc-cards{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:18px;padding:16px;}
#mc-cards.hidden{display:none;}
#mc-cards-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.mc-card{width:170px;border-radius:14px;overflow:hidden;cursor:pointer;background:rgba(0,10,30,0.6);border:1.5px solid rgba(80,160,255,0.35);transition:transform 0.15s,border-color 0.15s;}
.mc-card:hover{transform:translateY(-4px);border-color:rgba(120,200,255,0.7);}
.mc-card-art{width:100%;height:110px;display:block;}
.mc-card-label{padding:8px 10px 10px;text-align:center;}
.mc-card-title{color:#b8e4ff;font-size:13px;font-weight:800;letter-spacing:0.05em;}
.mc-card-desc{color:#7ab8d4;font-size:10px;margin-top:3px;line-height:1.4;}
#mc-back{position:absolute;bottom:10px;left:30px;z-index:20;}
#mc-final-ov{position:absolute;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;z-index:50;background:rgba(0,0,10,0.78);}
#mc-final-ov.show{display:flex;}
#mc-final-box{display:flex;flex-direction:column;align-items:center;gap:16px;background:rgba(4,14,40,0.97);border:1.5px solid rgba(100,160,255,0.35);border-radius:18px;padding:26px 32px;box-shadow:0 12px 34px rgba(0,0,0,0.5);max-width:90%;}
#mc-total-line{display:flex;align-items:center;gap:14px;font-size:50px;font-weight:900;color:#ffe060;text-shadow:0 0 14px #ffe06070;white-space:nowrap;}
#mc-total-label{font-size:16px;font-weight:700;color:#b8e4ff;letter-spacing:0.06em;text-transform:uppercase;margin-top:-10px;}
#mc-breakdown{display:flex;flex-direction:column;gap:8px;width:100%;margin-top:4px;}
.mc-bd-row{display:flex;justify-content:space-between;gap:20px;background:rgba(0,30,80,0.45);border:1px solid rgba(80,160,255,0.25);border-radius:10px;padding:8px 16px;font-size:15px;color:#dff0ff;}
.mc-bd-row b{color:#ffe060;}
</style>
</head>
<body>
<div id="mc-wrapper">
<div id="mc-root">

  <div id="mc-menu">
    <div id="mc-title">DERİN SULAR ÜÇLEMESİ</div>
    <div id="mc-btnstack">
      <button class="mc-btn green-stop upper" id="mc-btn-marathon">Maraton</button>
      <button class="mc-btn green-stop upper" id="mc-btn-single">Tekli</button>
    </div>
  </div>

  <div id="mc-cards" class="hidden">
    <div id="mc-title" style="font-size:18px;">Bir oyun seç</div>
    <div id="mc-cards-row"></div>
    <button class="mc-btn small-return-green" id="mc-btn-cards-back">&larr; Geri</button>
  </div>

  <iframe id="mc-frame"></iframe>

  <div id="mc-final-ov">
    <div id="mc-final-box">
      <div id="mc-total-line"><span>&#127942;</span><span id="mc-total-score">0</span></div>
      <div id="mc-total-label">Toplam Puan</div>
      <div id="mc-breakdown"></div>
      <button class="mc-btn green-stop" id="mc-btn-final-menu">Ana Menü</button>
    </div>
  </div>

  <button class="mc-btn red-stop-sm" id="mc-back" style="display:none;">&larr; Menü</button>

</div>
</div>

function b64ToText(b64){
  const bin=atob(b64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

const GAME_HTML={};
function ensureHtml(key){
  if(GAME_HTML[key])return GAME_HTML[key];
  const html=b64ToText(B64[key]);
  GAME_HTML[key]=html;
  return html;
}

function drawDerinDarbePreview(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#0a2035');g.addColorStop(1,'#04101c');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  const cols=4,rows=3,pad=6,gap=4;
  const cw=(w-pad*2-gap*(cols-1))/cols, ch=(h-pad*2-gap*(rows-1))/rows;
  const shapes=['star','fish','shell','jelly','octo','crab','star','fish','shell','jelly','octo','crab'];
  const colors=['#ff8a3d','#3dc6ff','#ffe066','#ff6bcb','#8a6bff','#5be37a'];
  let idx=0;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x=pad+c*(cw+gap), y=pad+r*(ch+gap);
      ctx.fillStyle='rgba(20,60,100,0.55)';
      ctx.strokeStyle='rgba(120,190,255,0.5)';ctx.lineWidth=1;
      roundRect(ctx,x,y,cw,ch,4);ctx.fill();ctx.stroke();
      const cx=x+cw/2, cy=y+ch/2, sz=Math.min(cw,ch)*0.32;
      ctx.save();ctx.translate(cx,cy);
      drawCreatureIcon(ctx,shapes[idx%shapes.length],sz,colors[idx%colors.length]);
      ctx.restore();
      idx++;
    }
  }
}
function drawCreatureIcon(ctx,type,sz,color){
  ctx.fillStyle=color;ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=1;
  if(type==='star'){
    ctx.beginPath();

      ctx.lineTo(Math.cos(a2)*sz*0.45,Math.sin(a2)*sz*0.45);}
    ctx.closePath();ctx.fill();ctx.stroke();
  }else if(type==='fish'){

    ctx.fillStyle='#001';ctx.beginPath();ctx.arc(sz*0.5,-sz*0.1,sz*0.12,0,6.283);ctx.fill();
  }else if(type==='shell'){
    ctx.beginPath();ctx.arc(0,sz*0.2,sz,Math.PI,0);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.strokeStyle='rgba(0,0,0,0.3)';for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*sz*0.2,sz*0.2);ctx.lineTo(0,-sz*0.5);ctx.stroke();}
  }else if(type==='jelly'){
    ctx.beginPath();ctx.arc(0,-sz*0.1,sz*0.75,Math.PI,0);ctx.fill();ctx.stroke();
    for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(i*sz*0.4,sz*0.1);ctx.quadraticCurveTo(i*sz*0.4+sz*0.15,sz*0.7,i*sz*0.4,sz*1.1);ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();}
  }else if(type==='octo'){
    ctx.beginPath();ctx.arc(0,-sz*0.15,sz*0.7,0,6.283);ctx.fill();ctx.stroke();
    for(let i=0;i<5;i++){const a=Math.PI*0.15+i*(Math.PI*0.7/4);ctx.beginPath();ctx.moveTo(Math.cos(a)*sz*0.6,Math.sin(a)*sz*0.3+sz*0.3);ctx.quadraticCurveTo(Math.cos(a)*sz*1.1,sz*0.9,Math.cos(a)*sz*0.7,sz*1.15);ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.stroke();}
  }else if(type==='crab'){
    ctx.beginPath();ctx.ellipse(0,0,sz*0.85,sz*0.55,0,0,6.283);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.ellipse(-sz*0.7,-sz*0.3,sz*0.25,sz*0.18,0,0,6.283);ctx.fill();
    ctx.beginPath();ctx.ellipse(sz*0.7,-sz*0.3,sz*0.25,sz*0.18,0,0,6.283);ctx.fill();
  }
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}

function drawGayzerSozePreview(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#001830');g.addColorStop(1,'#000508');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  const sy=h*0.78;
  const sg=ctx.createLinearGradient(0,sy,0,h);
  sg.addColorStop(0,'#6b5a3a');sg.addColorStop(1,'#3e2e18');
  ctx.fillStyle=sg;ctx.fillRect(0,sy,w,h-sy);
  [w*0.28,w*0.7].forEach(gx=>{
    ctx.fillStyle='#7f6a45';ctx.beginPath();ctx.ellipse(gx,sy+3,w*0.09,h*0.03,0,0,6.283);ctx.fill();
    ctx.fillStyle='#0c0805';ctx.beginPath();ctx.ellipse(gx,sy,w*0.03,h*0.012,0,0,6.283);ctx.fill();
  });
  const bubbles=[{x:w*0.28,y:h*0.42,r:w*0.16,t:'8+5'},{x:w*0.68,y:h*0.28,r:w*0.14,t:'12-4'}];
  bubbles.forEach(b=>{
    const grd=ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.1,b.x,b.y,b.r);
    grd.addColorStop(0,'rgba(220,245,255,0.4)');grd.addColorStop(1,'rgba(60,140,230,0.15)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,6.283);ctx.fill();
    ctx.strokeStyle='rgba(160,220,255,0.9)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.font='800 '+(b.r*0.42)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#fff';ctx.fillText(b.t,b.x,b.y);
  });
  const cw=w*0.16;
  ctx.fillStyle='#1a3a70';roundRect(ctx,w-cw-6,6,cw,h-12,6);ctx.fill();
  ctx.strokeStyle='#0a1830';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#03140a';roundRect(ctx,w-cw+2,14,cw-16,h*0.16,3);ctx.fill();
}

function drawLaBrentPreview(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#001830');g.addColorStop(1,'#00060f');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(120,190,255,0.7)';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(w*0.08,h*0.5);ctx.lineTo(w*0.55,h*0.5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(w*0.55,h*0.5);ctx.lineTo(w*0.85,h*0.2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(w*0.55,h*0.5);ctx.lineTo(w*0.85,h*0.8);ctx.stroke();
  [[w*0.85,h*0.2],[w*0.85,h*0.8]].forEach((p,i)=>{
    ctx.fillStyle=i===0?'rgba(80,255,140,0.35)':'rgba(255,80,80,0.3)';
    ctx.fillRect(p[0]-6,p[1]-14,20,28);
  });
  ctx.save();ctx.translate(w*0.2,h*0.5);
  ctx.fillStyle='#ffcc55';ctx.beginPath();ctx.ellipse(0,0,14,8,0,0,6.283);ctx.fill();
  ctx.beginPath();ctx.moveTo(-13,0);ctx.lineTo(-22,-7);ctx.lineTo(-22,7);ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawCardArt(canvas,key){
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  if(key==='derin-darbe')drawDerinDarbePreview(ctx,w,h);
  else if(key==='gayzer-soze')drawGayzerSozePreview(ctx,w,h);
  else if(key==='la-brent')drawLaBrentPreview(ctx,w,h);
}

function buildCards(onPick){
  const row=$('mc-cards-row');row.innerHTML='';
  GAMES.forEach(g=>{
    const card=document.createElement('div');card.className='mc-card';
    const canvas=document.createElement('canvas');canvas.className='mc-card-art';canvas.width=170;canvas.height=110;
    card.appendChild(canvas);
    const label=document.createElement('div');label.className='mc-card-label';
    label.innerHTML='<div class="mc-card-title">'+g.title+'</div><div class="mc-card-desc">'+g.desc+'</div>';
    card.appendChild(label);
    card.addEventListener('click',()=>onPick(g));
    row.appendChild(card);
    drawCardArt(canvas,g.key);
  });
}

const frame=$('mc-frame');
let mode=null; // 'single' | 'marathon'
let marathonIndex=0;
let gameScores=[]; // {title,score}
let pendingInit=null;

function showMenu(){
  mode=null;
  $('mc-menu').classList.remove('hidden');
  $('mc-cards').classList.add('hidden');
  frame.style.display='none';
  frame.removeAttribute('srcdoc');
  frame.src='about:blank';
  $('mc-final-ov').classList.remove('show');
  $('mc-back').style.display='none';
  pendingInit=null;
}

function loadGame(game,initFlags){
  pendingInit=initFlags||null;
  const html=ensureHtml(game.key);
  frame.removeAttribute('src');
  frame.srcdoc=html;
  frame.style.display='block';
}

function startSingle(game){
  mode='single';
  $('mc-menu').classList.add('hidden');
  $('mc-cards').classList.add('hidden');
  $('mc-back').style.display='inline-block';
  loadGame(game,null);
}

function loadMarathonLeg(idx){
  const isFirst=idx===0;
  const isLast=idx===GAMES.length-1;
  loadGame(GAMES[idx],{marathon:true,auto:!isFirst,last:isLast});
}

function startMarathon(){
  mode='marathon';
  marathonIndex=0;
  gameScores=[];
  $('mc-menu').classList.add('hidden');
  $('mc-cards').classList.add('hidden');
  $('mc-back').style.display='inline-block';
  loadMarathonLeg(0);
}

function showFinalResults(){
  const total=gameScores.reduce((a,g)=>a+g.score,0);
  $('mc-total-score').textContent=total;
  const bd=$('mc-breakdown');bd.innerHTML='';
  gameScores.forEach((g,i)=>{
    const row=document.createElement('div');row.className='mc-bd-row';
    row.innerHTML='<span>'+(i+1)+' - '+g.title+'</span><b>'+g.score+'</b>';
    bd.appendChild(row);
  });
  frame.style.display='none';
  $('mc-final-ov').classList.add('show');
}

$('mc-btn-marathon').addEventListener('click',startMarathon);
$('mc-btn-single').addEventListener('click',()=>{
  $('mc-menu').classList.add('hidden');
  $('mc-cards').classList.remove('hidden');
  buildCards(startSingle);
});
$('mc-btn-cards-back').addEventListener('click',showMenu);
$('mc-back').addEventListener('click',showMenu);
$('mc-btn-final-menu').addEventListener('click',showMenu);

window.addEventListener('message',(e)=>{
  const d=e.data;
  if(!d||!d.type)return;
  if(d.type==='childReady'){
    if(pendingInit&&frame.contentWindow){
      frame.contentWindow.postMessage({type:'mcInit',auto:!!pendingInit.auto,marathon:!!pendingInit.marathon,last:!!pendingInit.last},'*');
    }
    return;
  }
  if(mode==='marathon'&&d.type==='gameOver'){
    const g=GAMES[marathonIndex];
    gameScores.push({title:g.title,score:d.score||0});
  }
  if(mode==='marathon'&&d.type==='continueRequested'){
    marathonIndex++;
    if(marathonIndex<GAMES.length){
      loadMarathonLeg(marathonIndex);
    }else{
      showFinalResults();
    }
  }
});

showMenu();
})();
</script>
